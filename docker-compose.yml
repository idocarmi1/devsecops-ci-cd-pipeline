services:
  # Backend API container exposes health and message endpoints.
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend container serves the React build through Nginx and proxies /api.
  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
